name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"
      - name: Sync deps (incl. dev)
        run: uv sync --frozen --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pytest
        run: uv run pytest -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/.coverage

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare compose env
        run: |
          cp .env.example .env
          sed -i 's/^DEEPSEEK_API_KEY=.*/DEEPSEEK_API_KEY=sk-ci-dummy-not-used-at-build/' .env
      - name: Build images
        run: docker compose build
      - name: Smoke test
        run: |
          docker compose up -d
          sleep 20
          echo "==> Backend health"
          curl -fsS http://127.0.0.1:8000/health | jq .
          echo "==> Backend ready"
          curl -fsS http://127.0.0.1:8000/ready | jq . || true
          echo "==> Frontend"
          curl -fsS http://127.0.0.1:8080 > /dev/null && echo "Frontend OK" || echo "Frontend check skipped"
          docker compose down
